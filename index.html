<!DOCTYPE html>
<html>
<head>
<title>Hospital Patient Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

<div class="title-box text-center mb-4">
<h2>Hospital Patient Registration</h2>
</div>

<div class="card p-4 shadow">

<form id="patientForm">

<div class="row mb-3">

<div class="col">
<label>First Name</label>
<input type="text" id="fname" class="form-control" required>
</div>

<div class="col">
<label>Last Name</label>
<input type="text" id="lname" class="form-control" required>
</div>

</div>

<div class="row mb-3">

<div class="col">
<label>Age</label>
<input type="number" id="age" class="form-control" required>
</div>

<div class="col">
<label>Gender</label>
<input type="text" id="gender" class="form-control" placeholder="Male / Female" required>
</div>

</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" id="phone" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Problem</label>
<input type="text" id="problem" class="form-control" required>
</div>

<div class="row mb-3">
	<div class="col">
		<label>Appointment Date</label>
		<input type="text" id="appointmentDate" class="form-control" placeholder="YYYY-MM-DD" required>
	</div>
	<div class="col">
		<label>Appointment Time</label>
		<input type="text" id="appointmentTime" class="form-control" placeholder="e.g. 10:30 AM" required>
	</div>
</div>

<div class="mb-3">
	<label>Doctor Name</label>
	<input type="text" id="doctorName" class="form-control" required>
</div>

<button class="btn btn-primary w-100">Submit</button>

</form>

<a href="summary.html" class="btn btn-success mt-3 w-100">View Summary</a>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
