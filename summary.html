<!DOCTYPE html>
<html>
<head>

<title>Patient Statistics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">


<div class="title-box text-center mb-4">
	<h2>Patient Statistics</h2>
</div>

<!-- Disease/Problem Summary Table -->
<table class="table table-bordered mb-4" id="summaryTable">
	<thead class="table-dark">
		<tr>
			<th>Problem</th>
			<th>Total Patients</th>
			<th>Male</th>
			<th>Female</th>
			<th>Average Age</th>
		</tr>
	</thead>
	<tbody></tbody>
</table>

<!-- Charts Row (smaller, white background, below summary stats) -->
<div class="row mb-4 justify-content-center">
	<div class="col-md-6 mb-3">
		<div class="p-3 bg-white rounded shadow-sm">
			<h6 class="text-center mb-2">Disease Frequency</h6>
			<canvas id="diseaseBarChart" width="480" height="270" style="background:#fff;"></canvas>
		</div>
	</div>
	<div class="col-md-6 mb-3">
		<div class="p-3 bg-white rounded shadow-sm">
			<h6 class="text-center mb-2">Age Composition</h6>
			<canvas id="agePieChart" width="480" height="270" style="background:#fff;"></canvas>
		</div>
	</div>
</div>

<!-- Doctor Appointments Table -->
<h4 class="mt-4">Doctor Appointments</h4>
<table class="table table-bordered" id="doctorTable">
	<thead class="table-secondary">
		<tr>
			<th>Doctor Name</th>
			<th>Number of Appointments</th>
		</tr>
	</thead>
	<tbody></tbody>
</table>

<div class="d-flex gap-3">

<button class="btn btn-danger" onclick="clearData()">Clear Data</button>

<button class="btn btn-primary" onclick="downloadStats()">Download Statistics</button>

<a href="index.html" class="btn btn-secondary">Back</a>

</div>

</div>

<script src="script.js"></script>
<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
